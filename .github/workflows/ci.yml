name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  site-checks:
    name: Intégrité du site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Contrôles d'intégrité (liens, parité FR/EN/AR, placeholders, carrousel, SEO)
        run: python3 .automation/checks/check_site.py
